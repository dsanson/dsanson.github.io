project:
  type: website

execute:
  freeze: auto

website:
  title: "David Sanson"
  site-url: "https://www.davidsanson.com"
  image: "media/david.jpg"
  favicon: "favicon.ico"
  twitter-card: true
  open-graph: true
  body-footer: |
    © 2026 David Sanson. Created using [Quarto](https://quarto.org/).
  navbar:
    aria-label: navigation
    left:
      - href: index.md
        text: Home
      - href: research.md
        text: Research 
      - href: stuff.md
        text: Other Stuff
      - href: cv.md
        text: CV
    tools:
      - icon: github
        text: Github
        href: "https://github.com/dsanson/dsanson.github.io"

format:
  html:
    highlight-style: a11y
    theme:
      light: 
        - cosmo
        - custom.scss
      dark: 
        - darkly
        - custom.scss
    respect-user-color-scheme: true
    css: styles.css
    toc: true
    link-external-icon: true
    link-external-newwindow: true
    citations-hover: true
    footnotes-hover: true

