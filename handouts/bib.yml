- id: priest2005a
  abstract: Graham Priest presents a ground-breaking account of the semantics of intentional
    language--verbs such as “believes,” “fears,” “seeks,” or “imagines.” Towards Non-Being
    proceeds in terms of objects that may be either existent or non-existent, at worlds
    that may be either possible or impossible. The book will be of central interest
    to anyone who is concerned with intentionality in the philosophy of mind or philosophy
    of language, the metaphysics of existence and identity, the philosophy of fiction,
    the philosophy of mathematics, or cognitive representation in AI.
