- id: casati2009a
  abstract: Holes are an interesting case-study for ontologists andepistemologists.
    Naive, untutored descriptions of the world treat holesas objects of reference,
    on a par with ordinary material objects.(`There are as many holes in the cheese
    as there are cookies inthe tin.') And we often appeal to holes to account for
    causalinteractions, or to explain the occurrence of certain events.(`The water
    ran out because of the hole in the bucket.')Hence there is prima facie evidence
    for the existence of suchentities. Yet it might be argued that reference to holes
    is just afaçon de parler, that holes are mere entiarepresentationis, as-if entities,
    fictions.
